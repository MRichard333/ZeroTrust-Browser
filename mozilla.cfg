// ZeroTrust Browser — mozilla.cfg
// Deployed by installer to the Firefox installation directory.
// First line is ALWAYS ignored by Firefox — do not put real code here.
//
// lockPref() = sets AND locks the pref. User cannot change it in about:config.
// This runs as privileged JS before any profile is loaded — highest priority.
//
// HOW TO DEPLOY:
//   Linux/macOS: copy to <firefox-install>/mozilla.cfg
//   Windows:     copy to C:\Program Files\Mozilla Firefox\mozilla.cfg
//   Also deploy autoconfig.js to <firefox-install>/defaults/pref/autoconfig.js
//
// ═══════════════════════════════════════════════════════════════════

// ── Kill Firefox's built-in weather widget (all pref names, all versions) ──
lockPref("browser.newtabpage.activity-stream.showWeather",              false);
lockPref("browser.newtabpage.activity-stream.system.showWeather",       false);
lockPref("browser.newtabpage.activity-stream.feeds.weatherfeed",        false);
lockPref("browser.newtabpage.activity-stream.weather.query",            "");
lockPref("browser.newtabpage.activity-stream.weather.locationSearchEnabled", false);

// ── Kill all sponsored / default activity-stream content ──
lockPref("browser.newtabpage.activity-stream.showSponsored",            false);
lockPref("browser.newtabpage.activity-stream.showSponsoredTopSites",    false);
lockPref("browser.newtabpage.activity-stream.feeds.topsites",           false);
lockPref("browser.newtabpage.activity-stream.feeds.section.highlights", false);
lockPref("browser.newtabpage.activity-stream.feeds.snippets",           false);
lockPref("browser.newtabpage.activity-stream.feeds.newtabinit",         false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.addons",   false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.features", false);

// ── Disable activity-stream entirely ──
// Our zerotrust-newtab.xpi WebExtension (chrome_url_overrides) takes over.
lockPref("browser.newtabpage.activity-stream.enabled",                  false);
